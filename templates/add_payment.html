<!DOCTYPE html>
<html>
<head>
    <title>Record Payment - RupeeNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="container mt-4">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h3 class="text-center mb-3">💸 Record Repayment</h3>
            <p class="text-muted text-center mb-4">Record a payment for <strong>{{ loan[7] }}</strong> (Loan #{{ loan[0] }})</p>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Payment Amount (₹)</label>
                    <input type="number" step="0.01" class="form-control" name="amount" required placeholder="e.g. 500">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Payment Date</label>
                    <input type="date" class="form-control" name="payment_date" required id="payment_date">
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Notes (Optional)</label>
                    <input type="text" class="form-control" name="notes" placeholder="e.g. Cash, GPay, partial payment">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Record Payment</button>
                    <a href="/loan/{{ loan[0] }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Set default date to today
        document.getElementById('payment_date').valueAsDate = new Date();
    </script>
</body>
</html>
