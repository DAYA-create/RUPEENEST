<!DOCTYPE html>
<html>
<head>
    <title>Add Loan - RupeeNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="container mt-4">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h3 class="text-center mb-3">💰 New Loan</h3>
            <p class="text-muted text-center mb-4">Add a loan for <strong>{{ borrower[1] }}</strong></p>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Loan Amount (₹)</label>
                    <input type="number" step="0.01" class="form-control" name="amount" required placeholder="e.g. 10000">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Interest Rate (%)</label>
                    <input type="number" step="0.01" class="form-control" name="interest_rate" required placeholder="e.g. 2.0">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Interest Type</label>
                    <select class="form-select" name="interest_type" required>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly" selected>Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Start Date</label>
                    <input type="date" class="form-control" name="start_date" required id="start_date">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Save Loan</button>
                    <a href="/borrower/{{ borrower[0] }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Set default date to today
        document.getElementById('start_date').valueAsDate = new Date();
    </script>
</body>
</html>
