<!DOCTYPE html>
<html>
<head>
    <title>RupeeNest Dashboard</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<!--Dashboard page template-->
<body class="bg-light">

<div class="container">

    <div class="bg-primary text-white rounded p-4 mt-3 shadow">

        <h3>Welcome</h3>
        <h5>{{ session['user'] }}</h5>

        <p class="mb-0">
            Lending 
        </p>

    </div>
    <div class="mt-3">
    <a href="/borrowers" class="btn btn-primary">
        Manage Borrowers
    </a>
</div>

    <div class="row mt-4">

        <div class="col-6 mb-3">
            <div class="card shadow border-0">
                <div class="card-body text-center">
                    <h6>Total Lent</h6>
                    <h4>₹{{ total_lent }}</h4>
                </div>
            </div>
        </div>

        <div class="col-6 mb-3">
            <div class="card shadow border-0">
                <div class="card-body text-center">
                    <h6>Borrowers</h6>
                    <h4>{{ total_borrowers }}</h4>
                </div>
            </div>
        </div>

        <div class="col-6 mb-3">
            <div class="card shadow border-0">
                <div class="card-body text-center">
                    <h6>Interest</h6>
                    <h4>₹{{ total_interest }}</h4>
                </div>
            </div>
        </div>

        <div class="col-6 mb-3">
            <div class="card shadow border-0">
                <div class="card-body text-center">
                    <h6>Pending Balance</h6>
                    <h4>₹{{ total_pending }}</h4>
                </div>
            </div>
        </div>

    </div>

</div>

<nav class="navbar fixed-bottom bg-white border-top">

    <div class="container d-flex justify-content-around">

        <a href="/dashboard" class="fs-4" title="Dashboard">🏠</a>

        <a href="/borrowers" class="fs-4" title="Borrowers">👥</a>

        <a href="/logout" class="fs-4" title="Logout">🚪</a>

    </div>

</nav>

</body>

</html>
