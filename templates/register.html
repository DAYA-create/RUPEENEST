<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    
    <div class="container mt-5">
    <div class="card shadow p-4">
    <h1 class="text-center mb-2">💰 RupeeNest</h1>

<p class="text-center text-muted mb-4">
    Smart Lending & Borrower Management
</p>  

    <h2>Register</h2>

    <form method="POST">

       <input type="text"
       name="name"
       class="form-control"
       placeholder="Enter Name">
        

        <br><br>

       <input type="email"
       name="email"
       class="form-control"
       placeholder="Enter Email">

        <br><br>

       <input type="password"
       name="password"
       class="form-control"
       placeholder="Enter Password">

        <br><br>

        <button type="submit"
        class="btn btn-primary w-100">
         Register
        </button>

    </form>
    </div>
    </div>

</body>
</html>
