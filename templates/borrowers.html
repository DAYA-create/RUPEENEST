<!DOCTYPE html>
<html>
<head>
    <title>Borrowers</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-4"> </div>

    <h2 class="mb-4">👥 Borrowers</h2>

    <h2>Borrowers List</h2>

    <a href="/add_borrower">
        Add Borrower
    </a>

    <hr>
    <a href="/add_borrower"
   class="btn btn-success mb-3">
    ➕ Add Borrower
</a>

   {% for borrower in borrowers %}

<div class="card mb-3 shadow-sm">
    <div class="card-body">

        <h5>{{ borrower[1] }}</h5>

        <p class="text-muted">
            📞 {{ borrower[2] }}
        </p>

        <a href="/borrower/{{ borrower[0] }}"
           class="btn btn-primary">
            View Profile
        </a>

        <a href="/delete_borrower/{{ borrower[0] }}"
           class="btn btn-danger">
            Delete
        </a>

    </div>
</div>

{% endfor %}
    

</body>
</html>
